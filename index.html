<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Map Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 0; }
        .map-overlay { z-index: 1000; }
    </style>
</head>
<body class="bg-gray-950 text-white overflow-hidden">

    <div id="map-container" class="relative w-full h-screen">
        <div id="map"></div>
    </div>

    <!-- UI Overlay -->
    <div class="map-overlay absolute top-4 left-4 flex gap-2">
        <button onclick="changeMapStyle('light')" class="bg-white text-black px-4 py-2 rounded shadow font-bold hover:bg-gray-200">Sleek Light</button>
        <button onclick="changeMapStyle('dark')" class="bg-gray-800 text-white px-4 py-2 rounded shadow font-bold hover:bg-gray-700">Tactical Dark</button>
    </div>

    <script>
        let map = null;
        let currentTheme = 'dark';

        const mapConfigs = {
            dark: {
                url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                attr: '&copy; CartoDB'
            },
            light: {
                url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                attr: '&copy; CartoDB'
            }
        };

        function initMap(theme) {
            // Destroy existing map instance completely
            if (map) {
                map.remove();
                map = null;
            }

            // Re-create the div if needed or just clear it
            const mapEl = document.getElementById('map');
            mapEl.innerHTML = '';

            // Initialize fresh
            map = L.map('map', {
                center: [50.798, -1.121],
                zoom: 13,
                zoomControl: false
            });

            L.tileLayer(mapConfigs[theme].url, {
                attribution: mapConfigs[theme].attr
            }).addTo(map);

            currentTheme = theme;
        }

        function changeMapStyle(theme) {
            if (theme === currentTheme) return;
            initMap(theme);
        }

        // Start
        window.onload = () => initMap('dark');
    </script>
</body>
</html>
